<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#f0ede6"/>
  <!-- Oval border matching the nav logo -->
  <ellipse
    cx="50" cy="50"
    rx="44" ry="42"
    fill="none"
    stroke="#1a1a14"
    stroke-width="3.5"
  />
  <!-- "Fr" script text — italic serif approximating Great Vibes -->
  <text
    x="50" y="67"
    text-anchor="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
    font-size="46"
    font-style="italic"
    font-weight="400"
    fill="#1a1a14"
    letter-spacing="-1"
  >Fr</text>
</svg>